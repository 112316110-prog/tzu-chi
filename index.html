<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈濟網站範例</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 8px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>慈濟醫療教育平台</h1>
    </header>

    <main>
        <h2>歡迎使用本平台</h2>

        <p>
            本網站提供活動資訊、教學資源與最新公告。
        </p>

        <button onclick="showMessage()">了解更多</button>

        <p id="message"></p>
    </main>

    <footer>
        © 2026 慈濟醫療教育平台
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").textContent =
                "感謝您瀏覽慈濟醫療教育平台。";
        }
    </script>

</body>
</html>
